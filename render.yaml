services:
  - type: web
    name: senya-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORE_NAME
        value: Senya
      - key: SERVICE_NAME
        value: senya-api
      - key: CLIENT_ORIGIN
        value: https://senya-y7ov.onrender.com
      - key: PUBLIC_APP_URL
        value: https://senya-y7ov.onrender.com
      - key: VITE_API_URL
        value: /api
      - key: VITE_WHATSAPP_NUMBER
        sync: false
      - key: ADMIN_WHATSAPP_NUMBER
        sync: false
      - key: APP_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MONGODB_DB_NAME
        value: senya
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: senya-products
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
